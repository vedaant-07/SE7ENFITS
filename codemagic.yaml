workflows:
  se7en-fit-web-check:
    name: SE7EN FIT Web Check
    max_build_duration: 30
    environment:
      node: 20
    scripts:
      - name: Install root packages
        script: npm install
      - name: Install frontend packages
        script: npm --prefix ironforge/frontend install
      - name: Build frontend
        script: npm --prefix ironforge/frontend run build
      - name: Check backend
        script: node --check ironforge/backend/index.js
    artifacts:
      - ironforge/frontend/dist/**

  se7en-fit-capacitor-apk:
    name: SE7EN FIT Test APK
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install frontend packages
        script: npm --prefix ironforge/frontend install
      - name: Build frontend
        script: npm --prefix ironforge/frontend run build
      - name: Add Android platform
        script: cd ironforge/frontend && npx cap add android || true
      - name: Sync Android platform
        script: cd ironforge/frontend && npx cap sync android
      - name: Build debug APK
        script: cd ironforge/frontend/android && chmod +x ./gradlew && ./gradlew assembleDebug
    artifacts:
      - ironforge/frontend/android/app/build/outputs/apk/**/*.apk
